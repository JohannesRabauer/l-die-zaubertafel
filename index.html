<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Die Zaubertafel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-screen">
        <h1 class="chalk-title">Die Zaubertafel 🖍️</h1>
        <section class="selection-group">
            <h2>Klassenstufe wählen:</h2>
            <div class="grade-buttons">
                <button class="grade-btn" data-grade="1">Klasse 1</button>
                <button class="grade-btn" data-grade="2">Klasse 2</button>
                <button class="grade-btn" data-grade="3">Klasse 3</button>
                <button class="grade-btn" data-grade="4">Klasse 4</button>
                <button class="grade-btn" data-grade="5">Klasse 5-6</button>
                <button class="grade-btn" data-grade="0">Freier Modus</button>
            </div>
        </section>
        <section class="selection-group">
            <h2>Spielmodus wählen:</h2>
            <div class="mode-buttons">
                <button class="mode-btn" data-mode="uebung">Übungsmodus</button>
                <button class="mode-btn" data-mode="punkte">Punktemodus</button>
                <button class="mode-btn" data-mode="zeit">Zeitmodus</button>
                <button class="mode-btn" data-mode="frei">Freies Schreiben</button>
            </div>
        </section>
        <section id="free-config" class="config-panel hidden">
            <h3>Freier Modus – Einstellungen:</h3>
            <div class="checkbox-group">
                <label><input type="checkbox" name="op" value="+" checked> + Addition</label>
                <label><input type="checkbox" name="op" value="-" checked> − Subtraktion</label>
                <label><input type="checkbox" name="op" value="*"> × Multiplikation</label>
                <label><input type="checkbox" name="op" value="/"> ÷ Division</label>
            </div>
            <div class="range-input">
                <label>Zahlenraum bis: <input type="number" id="max-number" min="10" max="10000" value="100"></label>
            </div>
        </section>
        <section id="time-config" class="config-panel hidden">
            <h3>Zeit wählen:</h3>
            <div class="radio-group">
                <label><input type="radio" name="time" value="30"> 30 Sekunden</label>
                <label><input type="radio" name="time" value="60" checked> 60 Sekunden</label>
                <label><input type="radio" name="time" value="120"> 120 Sekunden</label>
            </div>
        </section>
        <button id="start-btn">Los geht's! 🚀</button>
    </div>

    <div id="game-screen" class="hidden">
        <header class="game-header">
            <button id="back-btn">← Zurück</button>
            <span id="score-display">0</span>
            <span id="timer-display" class="hidden">1:00</span>
            <span id="grade-label"></span>
        </header>
        <div id="task-display"></div>
        <canvas id="tafel-canvas"></canvas>
        <div class="toolbar">
            <button class="tool-btn active" id="tool-chalk">✏️ Kreide</button>
            <button class="tool-btn" id="tool-eraser">🧽 Radierer</button>
            <button class="tool-btn" id="tool-clear">🗑️ Löschen</button>
            <div id="color-buttons" class="hidden">
                <button class="color-btn" data-color="#ffffff" style="background:#ffffff"></button>
                <button class="color-btn" data-color="#ffff00" style="background:#ffff00"></button>
                <button class="color-btn" data-color="#ff69b4" style="background:#ff69b4"></button>
                <button class="color-btn" data-color="#87ceeb" style="background:#87ceeb"></button>
            </div>
        </div>
        <div id="answer-section">
            <input type="text" id="answer-input" placeholder="Deine Antwort..." inputmode="decimal" autocomplete="off">
            <button id="submit-btn">Prüfen ✓</button>
        </div>
    </div>

    <script src="canvas.js"></script>
    <script src="math.js"></script>
    <script src="rewards.js"></script>
    <script src="app.js"></script>
</body>
</html>
